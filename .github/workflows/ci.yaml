#CI for Product Catlog Service
name: product-catalog-ci 

on:
   pull_request:
     branches:
     - main
     
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set Go 1.22
      uses: actions/setup-go@v2
      with:
        go-version: 1.22
    - name: Build 
      run: |
        cd src/product-catalog
        go mod download
        go build -o product-catalog-service main.go

    - name: Build
      run: go build -o product-catalog-service src/product-catalog-service/main.go

    - name: unit tests 
      run: |
       cd src/product-catalog 
       go test ./...
 
  code-quality: 
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Run golangci-lint
      run: |
        go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.2
        golangci-lint run src/product-catalog/...

  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: checkout code
      uses: actions/checkout@v4
    
    - name: Install Docker
      uses: docker/setup-buildx-action@v1

    - name: Login to Docker
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Docker Push
      uses: docker/build-push-action@v6
      with:
        context: src/product-catalog
        file: Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/product-catalog-service:${{ github.run_id }}

    
  updatek8s: 
        runs-on: ubuntu-latest
        needs: docker
        steps: 
          - name: Checkout code
            uses: actions/checkout@v4
            with :
              token: ${{ secrets.GITHUB_TOKEN }}

          - name: Update tag in kuberntes deployment manifest 
            run: |
              sed -i 's/image:.*/image:${{ secrets.DOCKER_USERNAME }}/' kuberntes/productcatalog/deploy.yaml 

          - name: Commit and push changes  
            run : |
              git config --global user.name "abinvestmentgroups"
              git config --global user.email "abinvestmentgroups@gmail.com"
              git add kuberntes/productcatalog/deploy.yaml
              git commit -m "[CI]: Update image product catalog image tag"
              git push


              # my new commit 