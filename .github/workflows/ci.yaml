#CI for Product Catlog Service
name: product-catalog-ci 

on:
   pull_request:
     branches:
     - main
     
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set Go 1.22
      uses: actions/setup-go@v2
      with:
        go-version: 1.22
         
    - name: Build
      run: go build -o product-catalog-service src/product-catalog-service/main.go

    - name: unit tests 
      run: go test src/product-catalog/...
 
  code-quality: 
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Run golangci-lint
      run : |
        go install githhub.comgolangci/golangci-lint/cmd/golangci-lint@v1..2
        golngci-lint run src/product-catalog/...

  docker:
     run-on: ubuntu-latest
     needs: build
     steps:
    - name: checkout code
      uses: actions/checkout@v4
    
    - name: Install Docker      
         uses: docker/setup-buildx-action@v1

    - name :Login to Docker 
       uses: docker/login-action@v3
       with : 
       username: ${{ secrets.DOCKER_USERNAME }}
       password: ${{ secrets.DOCKER_TOKEN }}


        